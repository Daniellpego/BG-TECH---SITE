# Prometheus scrape config for CRM BG Tech
# Add to your prometheus.yml or Grafana Cloud agent config.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: crm-backend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - "backend:3001"     # Docker compose service name
        labels:
          env: staging
    # For production, use service discovery instead of static_configs

  - job_name: redis
    static_configs:
      - targets:
          - "redis:9121"       # Redis exporter
        labels:
          env: staging
